name: Build SlipStream-Rust (Linux amd64 & arm64)

on:
  push:
    branches:
      - main
      - master
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
            runner: ubuntu-latest
            
          - target: aarch64-unknown-linux-gnu
            arch: arm64
            runner: ubuntu-latest
    
    runs-on: ${{ matrix.runner }}
    name: Build ${{ matrix.arch }} (Linux)
    
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Install build dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            cmake
      
      - name: Install ARM64 cross-compile tools
        if: matrix.arch == 'arm64'
        run: |
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            libc6-dev-arm64-cross
      
      - name: Setup cross-compile environment
        if: matrix.arch == 'arm64'
        run: |
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-ar" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
      
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: slipstream-rust/target
          key: ${{ runner.os }}-cargo-build-target-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Build slipstream-client
        working-directory: slipstream-rust
        run: |
          cargo build \
            --release \
            --target ${{ matrix.target }} \
            -p slipstream-client
      
      - name: Build slipstream-server
        working-directory: slipstream-rust
        run: |
          cargo build \
            --release \
            --target ${{ matrix.target }} \
            -p slipstream-server
      
      - name: Strip binaries
        run: |
          aarch64-linux-gnu-strip slipstream-rust/target/${{ matrix.target }}/release/slipstream-client || true
          aarch64-linux-gnu-strip slipstream-rust/target/${{ matrix.target }}/release/slipstream-server || true
          strip slipstream-rust/target/${{ matrix.target }}/release/slipstream-client || true
          strip slipstream-rust/target/${{ matrix.target }}/release/slipstream-server || true
      
      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp slipstream-rust/target/${{ matrix.target }}/release/slipstream-client artifacts/slipstream-client-linux-${{ matrix.arch }}
          cp slipstream-rust/target/${{ matrix.target }}/release/slipstream-server artifacts/slipstream-server-linux-${{ matrix.arch }}
          chmod +x artifacts/*
      
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS
          cat SHA256SUMS
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: slipstream-Linux-${{ matrix.arch }}
          path: artifacts/
          retention-days: 30
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-go:
    strategy:
      matrix:
        include:
          - goarch: amd64
            arch: amd64
            
          - goarch: arm64
            arch: arm64
    
    runs-on: ubuntu-latest
    name: Build SlipStream-Plus ${{ matrix.arch }} (Linux)
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config
      
      - name: Install ARM64 cross-compile tools
        if: matrix.arch == 'arm64'
        run: |
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu
      
      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
      
      - name: Build SlipStream-Plus
        run: |
          GOOS=linux GOARCH=${{ matrix.goarch }} \
          CGO_ENABLED=1 \
          CC=gcc \
          go build \
            -v \
            -o slipstreamplus-linux-${{ matrix.arch }} \
            -ldflags="-w -s" \
            ./cmd/slipstreamplus
      
      - name: Strip binary
        run: |
          strip slipstreamplus-linux-${{ matrix.arch }} || true
      
      - name: Generate checksums
        run: |
          sha256sum slipstreamplus-linux-${{ matrix.arch }} > slipstreamplus-linux-${{ matrix.arch }}.sha256
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: SlipStream-Plus-Linux-${{ matrix.arch }}
          path: |
            slipstreamplus-linux-${{ matrix.arch }}
            slipstreamplus-linux-${{ matrix.arch }}.sha256
          retention-days: 30
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            slipstreamplus-linux-${{ matrix.arch }}
            slipstreamplus-linux-${{ matrix.arch }}.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
